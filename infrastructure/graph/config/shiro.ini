# Autenticação do Fuseki local do OSWADT — CREDENCIAIS DE DESENVOLVIMENTO.
# Este ficheiro é copiado para run/ (FUSEKI_BASE) pelo start-fuseki.ps1 na
# primeira execução. NUNCA usar estas credenciais fora da máquina local.
#
# Utilizador de desenvolvimento (documentado): admin / oswadt-dev-graph
#
# Nota: o Jetty embutido do Fuseki 5.x não tem SessionManager; o Shiro tem de
# operar SEM sessões (noSessionCreation + sessionStorageEnabled=false), senão
# a autenticação básica devolve HTTP 500 "No SessionManager".

[main]
localhostFilter = org.apache.jena.fuseki.authz.LocalhostFilter
sessionStorageEvaluator = org.apache.shiro.mgt.DefaultSessionStorageEvaluator
sessionStorageEvaluator.sessionStorageEnabled = false
securityManager.subjectDAO.sessionStorageEvaluator = $sessionStorageEvaluator

[users]
admin = oswadt-dev-graph

[roles]

[urls]
# health check anónimo (usado pelo roteiro manual; o cliente Node usa ASK{})
/$/ping = anon
# restante administração apenas a partir de localhost
/$/** = localhostFilter
# datasets exigem autenticação básica, sem criação de sessão
/** = noSessionCreation,authcBasic,user[admin]
